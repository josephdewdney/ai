    "reference": "https://en.wikipedia.org/wiki/General_Problem_Solver"
  },
  {
    "term": "Google Gemini",
    "definition": "A large language model developed by Google, launched in 2023 as a major competitor in the generative AI space.",
    "reference": "https://en.wikipedia.org/wiki/Google_Gemini"
  },
  {
    "term": "GPT",
    "definition": "Generative Pre-trained Transformer (GPT) is a family of large language models developed by OpenAI. GPT models are trained on vast amounts of text data using unsupervised learning and leverage the Transformer architecture to generate human-like text for a wide range of tasks.",
    "reference": "https://openai.com/research/gpt-3"
  },
  {
    "term": "Hopfield Network",
    "definition": "A form of recurrent neural network introduced by John Hopfield in 1982, used for associative memory and optimization problems.",
    "reference": "https://en.wikipedia.org/wiki/Hopfield_network"
  },
  {
    "term": "IBM Watson",
    "definition": "An AI system developed by IBM that defeated human champions on the quiz show Jeopardy! in 2011, showcasing advances in natural language processing.",
    "reference": "https://en.wikipedia.org/wiki/Watson_(computer)"
  },
  {
    "term": "ImageNet",
    "definition": "A large-scale image database launched in 2009 by Fei-Fei Li and colleagues, used for visual object recognition research.",
    "reference": "https://en.wikipedia.org/wiki/ImageNet"
  },
  {
    "term": "Lighthill Report",
    "definition": "A 1973 report by James Lighthill that criticized AI research in the UK, leading to funding cuts and the first AI winter in Britain.",
    "reference": "https://en.wikipedia.org/wiki/Lighthill_report"
  },
  {
    "term": "Lisp Machine",
    "definition": "A type of computer designed to efficiently run the Lisp programming language, popular in AI research in the 1980s before the AI winter.",
    "reference": "https://en.wikipedia.org/wiki/Lisp_machine"
  },
  {
    "term": "Logic Theorist",
    "definition": "A computer program developed by Allen Newell and Herbert A. Simon in 1955 that proved mathematical theorems, considered the first AI program.",
    "reference": "https://en.wikipedia.org/wiki/Logic_Theorist"
  },
  {
    "term": "Machine Learning",
    "definition": "A subset of artificial intelligence in which systems learn patterns from data to make predictions or decisions without being explicitly programmed for every task.",
    "reference": "https://en.wikipedia.org/wiki/Machine_learning"
  },
  {
    "term": "Moravec's Paradox",
    "definition": "The observation by Hans Moravec that high-level reasoning requires little computation, but low-level sensorimotor skills require enormous computational resources.",
    "reference": "https://en.wikipedia.org/wiki/Moravec%27s_paradox"
  },
  {
    "term": "Nobel Prize (AI)",
    "definition": "In 2024, Nobel Prizes were awarded to John Hopfield, Geoffrey Hinton, Demis Hassabis, John Jumper, and David Baker for their contributions to AI and protein folding.",
    "reference": "https://www.nobelprize.org/all-nobel-prizes-2024/"
  },
  {
    "term": "Perceptron",
    "definition": "An early neural network model invented by Frank Rosenblatt in 1957, capable of learning simple patterns.",
    "reference": "https://en.wikipedia.org/wiki/Perceptron"
  },
  {
    "term": "Perceptrons (book)",
    "definition": "A 1969 book by Marvin Minsky and Seymour Papert that analyzed the limitations of single-layer neural networks, contributing to the first AI winter.",
    "reference": "https://en.wikipedia.org/wiki/Perceptrons_(book)"
  },
  {
    "term": "Symbolic AI",
    "definition": "An approach to AI based on encoding human knowledge as rules and logic (if this, then that).",
    "reference": "https://en.wikipedia.org/wiki/Symbolic_artificial_intelligence"
  },
  {
    "term": "Scaling",
    "definition": "Making AI models larger and training them on more data, which has been shown to produce unexpectedly better results and new capabilities.",
    "reference": "https://en.wikipedia.org/wiki/Neural_scaling_law"
  },
  {
    "term": "SNARC",
    "definition": "The Stochastic Neural Analog Reinforcement Calculator, built by Marvin Minsky and Dean Edmonds in 1951, was the first artificial neural network machine.",
    "reference": "https://en.wikipedia.org/wiki/Stochastic_Neural_Analog_Reinforcement_Calculator"
  },
  {
    "term": "Transformer",
    "definition": "A neural network architecture introduced in the paper 'Attention Is All You Need' (2017) by Vaswani et al. It relies entirely on self-attention mechanisms, dispensing with recurrence and convolutions, and has become the foundation for most modern large language models.",
    "reference": "https://arxiv.org/abs/1706.03762"
  },
  {
    "term": "Turing Machine",
    "definition": "A theoretical computational model introduced by Alan Turing in 1936, which manipulates symbols on a strip of tape according to a set of rules. It is a foundational concept in computer science and AI.",
    "reference": "https://en.wikipedia.org/wiki/Turing_machine"
  },
  {
    "term": "Turing Test",
    "definition": "A test proposed by Alan Turing in 1950 to determine whether a machine can exhibit intelligent behavior indistinguishable from a human.",
    "reference": "https://en.wikipedia.org/wiki/Turing_test"
  },
  {
    "term": "RLVR",
    "definition": "Reinforcement Learning with Verifiable Rewards — training AI models using objective, automatically checkable rewards (e.g. does the code compile, is the maths correct) rather than human preferences. Emerged as a major training paradigm in 2024-2025.",
    "reference": "https://karpathy.bearblog.dev/year-in-review-2025/"
  },
  {
    "term": "Test-Time Compute",
    "definition": "Spending more compute at inference time (when the model is answering) rather than at training time. Models 'think longer' by generating chains of reasoning before producing a final answer.",
    "reference": "https://openai.com/index/learning-to-reason-with-llms/"
  }
]
  </script>
</head>
<body class="font-body text-gray-600 min-h-screen antialiased">

  <header class="pt-16 pb-6 text-center">
    <h1 class="hero-title font-display text-5xl md:text-6xl font-800 text-gray-900 tracking-tight">
      AI
    </h1>
    <p class="hero-sub text-lg text-gray-600 mt-2 font-light tracking-wide">
      From Turing to Transformers
    </p>
    <div class="hero-bar h-[2px] bg-gray-300 mx-auto mt-5 rounded-full"></div>
  </header>

  <div class="relative max-w-[700px] mx-auto pl-12 pb-20" id="data">
    <div class="timeline-line absolute left-[21px] top-0 bottom-0 w-[2px] rounded-full"></div>
  </div>

  <script>
    let allData = [];
    let eras = [];
    let glossary = [];
    const usedGlossaryTerms = new Set();

    function loadData() {
      allData = JSON.parse(document.getElementById('timeline-data').textContent);
      eras = JSON.parse(document.getElementById('eras-data').textContent);
      glossary = JSON.parse(document.getElementById('glossary-data').textContent);
      allData.sort((a, b) => new Date(a.date) - new Date(b.date));
      render();
      requestAnimationFrame(() => observeElements());
    }

    function annotateGlossary(text) {
      const sorted = [...glossary].sort((a, b) => b.term.length - a.term.length);
      let result = text;
      for (const entry of sorted) {
        if (usedGlossaryTerms.has(entry.term)) continue;
        const regex = new RegExp(`\\b(${entry.term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})\\b`, 'i');
        if (regex.test(result)) {
          usedGlossaryTerms.add(entry.term);
          const tooltipHtml = `<span class="glossary-tooltip">${escapeHtml(entry.definition)}</span>`;
          result = result.replace(regex, `<span class="glossary-term">$1${tooltipHtml}</span>`);
        }
      }
      return result;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      const day = String(d.getDate()).padStart(2, '0');
      const month = String(d.getMonth() + 1).padStart(2, '0');
      return `${day}.${month}.${d.getFullYear()}`;
    }

    function render() {
      usedGlossaryTerms.clear();
      const dataDiv = document.getElementById('data');
      dataDiv.innerHTML = '<div class="timeline-line absolute left-[21px] top-0 bottom-0 w-[2px] rounded-full"></div>';

      const events = allData.filter(e => e.featured);
      let cardIndex = 0;

      for (const era of eras) {
        const eraEvents = events.filter(e => e.era === era.id);
        if (eraEvents.length === 0) continue;

        const heading = document.createElement('div');
        heading.className = 'era-heading relative mt-14 mb-3 cursor-pointer select-none';
        heading.innerHTML = `
          <div class="era-node absolute left-[-33px] top-[8px] w-3.5 h-3.5 rounded-full bg-gray-400 z-10 ring-[3px] ring-[#fafafa] transition-all duration-300"></div>
          <div>
            ${era.years ? `<div class="absolute left-[-192px] top-[9.5px] w-[125px] text-right font-mono text-[0.78rem] text-gray-500 whitespace-nowrap z-20 pointer-events-none leading-none tracking-wider">${escapeHtml(era.years)}</div>` : ''}
            <h2 class="font-display text-[1.6rem] font-700 text-gray-900 tracking-tight leading-snug">${escapeHtml(era.name)}</h2>
            <p class="text-sm text-gray-600 mt-0.5">${escapeHtml(era.description)}</p>
          </div>
        `;
        dataDiv.appendChild(heading);

        const eraContainer = document.createElement('div');
        eraContainer.className = 'era-events';

        heading.addEventListener('click', () => {
          const node = heading.querySelector('.era-node');
          if (eraContainer.style.maxHeight === '0px') {
            eraContainer.style.overflowY = 'clip';
            eraContainer.style.maxHeight = eraContainer.scrollHeight + 'px';
            eraContainer.classList.remove('collapsed');
            node.style.transform = 'scale(1)';
            node.style.opacity = '1';
            eraContainer.addEventListener('transitionend', function handler() {
              eraContainer.style.overflowY = 'visible';
              eraContainer.removeEventListener('transitionend', handler);
            });
          } else {
            eraContainer.style.overflowY = 'clip';
            eraContainer.style.maxHeight = '0px';
            eraContainer.classList.add('collapsed');
            node.style.transform = 'scale(0.7)';
            node.style.opacity = '0.4';
          }
        });

        for (const event of eraEvents) {
          const eventDiv = document.createElement('div');
          eventDiv.className = 'event-card relative mt-7 mb-7 ml-1 py-4 px-5 rounded-xl bg-white border border-gray-100 shadow-sm';
          eventDiv.style.transitionDelay = `${(cardIndex % 4) * 50}ms`;

          if (event.logo) {
            const logoDiv = document.createElement('div');
            logoDiv.className = 'absolute left-[-49px] top-[8px] w-9 h-9 rounded-full bg-white z-10 flex items-center justify-center shadow-sm border border-gray-100';
            const logoImg = document.createElement('img');
            logoImg.src = event.logo;
            logoImg.alt = '';
            logoImg.className = 'size-5 rounded-full object-contain';
            logoImg.loading = 'lazy';
            logoDiv.appendChild(logoImg);
            eventDiv.appendChild(logoDiv);
          } else {
            const circle = document.createElement('div');
            circle.className = 'node-dot absolute left-[-36px] top-[22px] size-2.5 rounded-full bg-gray-400 z-10 ring-[3px] ring-[#fafafa] text-gray-400';
            eventDiv.appendChild(circle);
          }

          const contentDiv = document.createElement('div');

          const dateDiv = document.createElement('div');
          dateDiv.className = 'absolute left-[-192px] top-[20px] w-[125px] text-right font-mono text-[0.78rem] text-gray-500 whitespace-nowrap z-20 pointer-events-none leading-none tracking-wider';
          dateDiv.textContent = event.category === 'Trend' ? '??' : formatDate(event.date);
          contentDiv.appendChild(dateDiv);

          const titleDiv = document.createElement('div');
          titleDiv.className = 'font-display text-[1.1rem] font-700 text-gray-900 mb-1 leading-snug tracking-tight';
          titleDiv.textContent = event.title;
          contentDiv.appendChild(titleDiv);

          const descDiv = document.createElement('div');
          descDiv.className = 'text-[0.88rem] leading-relaxed text-gray-600';
          descDiv.innerHTML = annotateGlossary(escapeHtml(event.description));
          contentDiv.appendChild(descDiv);

          eventDiv.appendChild(contentDiv);
          eraContainer.appendChild(eventDiv);
          cardIndex++;
        }

        dataDiv.appendChild(eraContainer);
        requestAnimationFrame(() => {
          eraContainer.style.maxHeight = '0px';
          eraContainer.style.overflowY = 'clip';
          eraContainer.classList.add('collapsed');
          const node = heading.querySelector('.era-node');
          node.style.transform = 'scale(0.7)';
          node.style.opacity = '0.4';
        });
      }
    }

    function observeElements() {
      const observer = new IntersectionObserver((entries) => {
        for (const entry of entries) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        }
      }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });
      document.querySelectorAll('.event-card, .era-heading').forEach(el => observer.observe(el));
    }

    loadData();
  </script>
</body>
</html>

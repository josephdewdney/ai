<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI History Visualization</title>
  <style>
        .event-default-circle {
          position: absolute;
          left: -32px;
          top: 32px;
          width: 24px;
          height: 24px;
          border-radius: 50%;
          background: #0078d7;
          z-index: 2;
          display: flex;
          align-items: center;
          justify-content: center;
        }
    body { font-family: Arial, sans-serif; margin: 40px; background: #f9f9f9; }
    h1 { text-align: center; }
    .timeline {
      max-width: 700px;
      margin: 0 auto;
      position: relative;
      padding-left: 40px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 17px;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #0078d7;
      border-radius: 2px;
    }
    .event {
      position: relative;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      display: flex;
      margin: 30px 0;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 12px;
        padding-right: 12px;
      border-left: none;
      min-height: 60px;
    }
    .event-logo {
      position: absolute;
      left: -38px;
      top: 26px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #f9f9f9;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .event-logo-img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
    }
    .event-date {
      position: absolute;
      left: -170px;
      top: 45px;
      transform: translateY(-50%);
      width: 120px;
      text-align: right;
      font-weight: bold;
      color: #0078d7;
      font-size: 1.05em;
      white-space: nowrap;
      z-index: 3;
      pointer-events: none;
      line-height: 1;
      letter-spacing: 0.5px;
    }
    .event .title {
      font-size: 1.2em;
      margin: 8px 0 4px 0;
    }
    .event .desc {
      color: #333;
    }
    .event .links {
      margin-top: 8px;
    }
    .event .links a {
      color: #0078d7;
      text-decoration: none;
      margin-right: 10px;
    }
    .event .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>AI</h1>
  <div class="timeline" id="data"></div>
  <script>
    async function loadData() {
      const response = await fetch('data.json');
      const data = await response.json();
      const dataDiv = document.getElementById('data');
      data.sort((a, b) => new Date(a.date) - new Date(b.date));
      data.forEach(event => {
        const eventDiv = document.createElement('div');
        eventDiv.className = 'event';
        // Show logo as timeline circle if present, otherwise show default circle
        if (event.logo) {
          const logoDiv = document.createElement('div');
          logoDiv.className = 'event-logo';
          const logoImg = document.createElement('img');
          logoImg.src = event.logo;
          logoImg.alt = 'event logo';
          logoImg.className = 'event-logo-img';
          logoDiv.appendChild(logoImg);
          eventDiv.appendChild(logoDiv);
        } else {
          const defaultCircle = document.createElement('div');
          defaultCircle.className = 'event-default-circle';
          eventDiv.appendChild(defaultCircle);
        }
        eventDiv.innerHTML += `
          <div>
            <div class="event-date">${event.date}</div>
            <div class="title">${event.title}</div>
            <div class="desc">${event.description}</div>
          </div>
        `;
        dataDiv.appendChild(eventDiv);
      });
    }
    loadData();
  </script>
</body>
</html>

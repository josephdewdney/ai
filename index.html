<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI History Visualization</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <h1 class="text-center text-3xl font-bold mb-8">AI</h1>
  <div class="relative max-w-[700px] mx-auto pl-10" id="data">
    <!-- Timeline line -->
    <div class="absolute left-4 top-0 bottom-0 w-1 bg-blue-600 rounded"></div>
  </div>
  <script>
    async function loadData() {
      const response = await fetch('data.json');
      const data = await response.json();
      const dataDiv = document.getElementById('data');
      data.sort((a, b) => new Date(a.date) - new Date(b.date));
      data.forEach(event => {
        // Timeline event container
        const eventDiv = document.createElement('div');
        eventDiv.className = 'relative bg-white rounded-lg shadow-md flex mt-8 mb-8 py-3 px-3 min-h-[60px]';

        // Timeline circle/logo
        if (event.logo) {
          const logoDiv = document.createElement('div');
          logoDiv.className = 'absolute left-[-38px] top-[26px] w-9 h-9 rounded-full bg-gray-100 z-10 flex items-center justify-center';
          const logoImg = document.createElement('img');
          logoImg.src = event.logo;
          logoImg.alt = 'event logo';
          logoImg.className = 'w-6 h-6 rounded-full object-cover';
          logoDiv.appendChild(logoImg);
          eventDiv.appendChild(logoDiv);
        } else {
          const defaultCircle = document.createElement('div');
          defaultCircle.className = 'absolute left-[-32px] top-[32px] w-6 h-6 rounded-full bg-blue-600 z-10 flex items-center justify-center';
          eventDiv.appendChild(defaultCircle);
        }

        // Event content
        const contentDiv = document.createElement('div');
        // Date
        const dateDiv = document.createElement('div');
        dateDiv.className = 'absolute left-[-170px] top-[45px] w-[120px] text-right font-bold text-blue-600 text-[1.05em] whitespace-nowrap z-20 pointer-events-none leading-none tracking-wide';
        dateDiv.textContent = event.date;
        contentDiv.appendChild(dateDiv);
        // Title
        const titleDiv = document.createElement('div');
        titleDiv.className = 'text-lg font-semibold mt-2 mb-1';
        titleDiv.textContent = event.title;
        contentDiv.appendChild(titleDiv);
        // Description
        const descDiv = document.createElement('div');
        descDiv.className = 'text-gray-800';
        descDiv.textContent = event.description;
        contentDiv.appendChild(descDiv);
        eventDiv.appendChild(contentDiv);
        dataDiv.appendChild(eventDiv);
      });
    }
    loadData();
  </script>
</body>
</html>

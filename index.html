<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI History Visualization</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f9f9f9; }
    h1 { text-align: center; }
    .timeline {
      max-width: 700px;
      margin: 0 auto;
      position: relative;
      padding-left: 40px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 20px;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #0078d7;
      border-radius: 2px;
    }
    .event {
      position: relative;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin: 30px 0;
      padding: 20px 24px 20px 40px;
      border-left: none;
      min-height: 60px;
    }
    .event::before {
      content: '';
      position: absolute;
      left: -32px;
      top: 32px;
      width: 16px;
      height: 16px;
      background: #fff;
      border: 4px solid #0078d7;
      border-radius: 50%;
      box-shadow: 0 0 0 4px #f9f9f9;
      z-index: 2;
    }
    .event-date {
      position: absolute;
      left: -170px;
      top: 45px;
      transform: translateY(-50%);
      width: 120px;
      text-align: right;
      font-weight: bold;
      color: #0078d7;
      font-size: 1.05em;
      white-space: nowrap;
      z-index: 3;
      pointer-events: none;
      line-height: 1;
      letter-spacing: 0.5px;
    }
    .event .title {
      font-size: 1.2em;
      margin: 8px 0 4px 0;
    }
    .event .desc {
      color: #333;
    }
    .event .links {
      margin-top: 8px;
    }
    .event .links a {
      color: #0078d7;
      text-decoration: none;
      margin-right: 10px;
    }
    .event .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>AI</h1>
  <div class="timeline" id="data"></div>
  <script>
    async function loadData() {
      const response = await fetch('data.json');
      const data = await response.json();
      const dataDiv = document.getElementById('data');
      data.sort((a, b) => new Date(a.date) - new Date(b.date));
      data.forEach(event => {
        const eventDiv = document.createElement('div');
        eventDiv.className = 'event';
          let logoHtml = '';
          // Show X logo for Karpathy's Vibe Coding Tweet
          if (event.title && event.title.includes("Karpathy") && event.category === "Tweet") {
            logoHtml = `<img src="logos/x-logo/logo-black.png" alt="X logo" style="height:24px;width:24px;vertical-align:middle;margin-right:8px;">`;
          }
          eventDiv.innerHTML = `
            <div class="event-date">${event.date}</div>
            <div class="title">${logoHtml}${event.title}</div>
            <div class="desc">${event.description}</div>
          `;
        dataDiv.appendChild(eventDiv);
      });
    }
    loadData();
  </script>
</body>
</html>
